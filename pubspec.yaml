name: yourpass
description: "A privacy first and offline password manager"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  animations: ^2.2.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  fonts:
    - family: Sen
      fonts:
        - asset: assets/fonts/Sen-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sen-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sen-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sen-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sen-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#e9ecf2"
  image: "assets/images/app_logo_light.png"

  color_dark: "#0d1016"
  image_dark: "assets/images/app_logo_dark.png"

  android_12:
    color: "#e9ecf2"
    image: "assets/images/app_logo_light.png"

    color_dark: "#0d1016"
    image_dark: "assets/images/app_logo_dark.png"

# Terminal commands:
# 1. For launcher icons: dart run flutter_launcher_icons
# 2. For native splash: dart run flutter_native_splash:create
